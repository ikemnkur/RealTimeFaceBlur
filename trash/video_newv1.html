<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Face Blur — Video</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');

        :root {
            --bg: #0d0d12;
            --surface: #14141c;
            --surface2: #1c1c28;
            --border: rgba(255,255,255,0.07);
            --accent: #7c6cfc;
            --accent2: #c084fc;
            --green: #22d3a0;
            --red: #f87171;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'DM Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: var(--display);
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        nav ul { list-style: none; display: flex; gap: 1.5rem; }
        nav a {
            text-decoration: none;
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: var(--text); }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 3rem;
            gap: 1.2rem;
        }

        /* Desktop: side-by-side layout */
        .content-wrapper {
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 0 0 320px;
            /* min-width: 280px; */
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .page-title {
            font-family: var(--display);
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            text-align: center;
        }
        .page-title span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── STATUS PILL ── */
        #status {
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all 0.3s;
        }
        #status.ready  { border-color: var(--green); color: var(--green); }
        #status.active { border-color: var(--accent); color: var(--accent); }
        #status.recording { border-color: var(--red); color: var(--red); }

        /* ── UPLOAD ── */
        .upload-area {
            width: 100%;
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: var(--surface);
        }
        .upload-area:hover, .upload-area.dragging {
            border-color: var(--accent);
            background: rgba(124,108,252,0.06);
        }
        .upload-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .upload-area h3 {
            font-family: var(--display);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .upload-area p { font-size: 0.75rem; color: var(--muted); }

        /* ── CANVAS WRAPPER ── */
        .canvas-wrap {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.6);
            max-width: 100%;
            max-height: 512px;
        }
        video { display: none; }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 512px;
            width: auto;
            height: auto;
            background: #000;
        }

        /* ── VIDEO CONTROLS ── */
        .video-controls {
            display: none;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem;
        }
        .video-controls.active { display: flex; }
        .playback-row {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            justify-content: center;
        }
        .time-display {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            min-width: 110px;
            text-align: center;
        }

        /* ── RECORD BUTTONS ── */
        .rec-row {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ── SETTINGS ── */
        .settings {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .settings-title {
            font-family: var(--display);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .setting-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .setting-row label {
            font-size: 0.75rem;
            color: var(--muted);
            min-width: 130px;
        }
        .setting-row input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }
        .setting-row select {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 0.3rem 0.5rem;
            font-size: 0.78rem;
            font-family: var(--mono);
        }
        .setting-val {
            font-size: 0.72rem;
            color: var(--accent);
            min-width: 55px;
            text-align: right;
        }

        /* ── MEMORY METER ── */
        .mem-bar-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .mem-bar-wrap label { font-size: 0.75rem; color: var(--muted); min-width: 130px; }
        .mem-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 99px;
            overflow: hidden;
        }
        .mem-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--accent));
            border-radius: 99px;
            transition: width 1s;
            width: 0%;
        }
        .mem-label {
            font-size: 0.72rem;
            color: var(--muted);
            min-width: 55px;
            text-align: right;
        }

        /* ── BUTTONS ── */
        button {
            font-family: var(--mono);
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            padding: 0.55rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: var(--surface2);
            color: var(--text);
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        button.btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        button.btn-primary:hover:not(:disabled) { background: var(--accent2); border-color: var(--accent2); color: #fff; }
        button.btn-danger { border-color: var(--red); color: var(--red); }
        button.btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.1); }
        button.btn-green { border-color: var(--green); color: var(--green); }
        button.btn-green:hover:not(:disabled) { background: rgba(34,211,160,0.1); }

        /* seekbar */
        input[type=range].seek-bar {
            width: 100%;
            accent-color: var(--accent);
        }

        footer {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.72rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 480px) {
            nav ul { gap: 0.9rem; }
            nav a { font-size: 0.7rem; }
        }

        /* Mobile: stack layout with side-by-side controls */
        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column;
            }
            .left-panel {
                order: 2;
                flex: 1 1 auto;
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }
            .left-panel .upload-area {
                flex: 1 1 45%;
                min-width: 200px;
            }
            .left-panel .settings {
                flex: 1 1 45%;
                min-width: 200px;
            }
            .right-panel {
                order: 1;
                width: 100%;
            }
            .canvas-wrap {
                max-height: none;
            }
            canvas {
                max-height: 60vh;
            }
        }

        @media (max-width: 480px) {
            .left-panel {
                flex-direction: column;
            }
            .left-panel .upload-area,
            .left-panel .settings {
                flex: 1 1 100%;
                min-width: auto;
            }
        }
    </style>
</head>

    <ul>

<div class="main">
    <h1 class="page-title">Video <span>Face Blur</span></h1>

    <div id="status">Loading AI model…</div>

    <div class="content-wrapper">
        <!-- Left Panel: Upload & Settings -->
        <div class="left-panel">
            <!-- Upload -->
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('uploadVideo').click()">
                <div class="upload-icon">📁</div>
                <h3>Click or drop a video here</h3>
                <p>MP4 · WebM · MOV · AVI</p>
                <input type="file" id="uploadVideo" accept="video/*" style="display:none">
            </div>

            <!-- Settings -->
            <div class="settings">
                <div class="settings-title">Settings</div>

                <div class="setting-row">
                    <label>Output Resolution</label>
                    <select id="resolutionSelect">
                        <option value="1">Original (100%)</option>
                        <option value="0.75">High (75%)</option>
                        <option value="0.5" selected>Medium (50%)</option>
                        <option value="0.25">Low (25%)</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label>Ellipse Size</label>
                    <input type="range" id="blurRadius" min="10" max="80" value="30" step="5">
                    <span class="setting-val" id="blurValue">30px</span>
                </div>

                <div class="setting-row">
                    <label>Detection Interval</label>
                    <input type="range" id="detectionRate" min="100" max="1000" value="300" step="50">
                    <span class="setting-val" id="rateValue">300ms</span>
                </div>

                <div class="setting-row">
                    <label>Sensitivity</label>
                    <input type="range" id="sensitivity" min="0.5" max="0.95" value="0.7" step="0.05">
                    <span class="setting-val" id="sensitivityValue">0.70</span>
                </div>

                <div class="setting-row">
                    <label>Max Faces</label>
                    <input type="range" id="maxFacesIn" min="1" max="3" value="1" step="1">
                    <span class="setting-val" id="maxFacesValue">1</span>
                </div>

                <div class="setting-row">
                    <label>Mask Type</label>
                    <select id="maskTypeSelect">
                        <option value="blur" selected>Blur (Pixelated)</option>
                        <option value="black">Black Ellipse</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label>Size Offset</label>
                    <input type="range" id="sizeOffset" min="-30" max="50" value="0" step="5">
                    <span class="setting-val" id="sizeOffsetValue">+0px</span>
                </div>

                <!-- TF.js tensor memory meter -->
                <div class="mem-bar-wrap">
                    <label>TF Memory</label>
                    <div class="mem-bar-bg"><div class="mem-bar-fill" id="memFill"></div></div>
                    <span class="mem-label" id="memLabel">0 tensors</span>
                </div>
            </div>
        </div>

        <!-- Right Panel: Canvas & Controls -->
        <div class="right-panel">
            <!-- Canvas -->
            <div class="canvas-wrap">
                <video id="inputVideo" muted playsinline></video>
                <canvas id="outputCanvas"></canvas>
            </div>

            <!-- Playback controls -->
            <div class="video-controls" id="videoControls">
                <div class="playback-row">
                    <button id="playPauseBtn">▶ Play</button>
                    <button id="restartBtn">↺ Restart</button>
                    <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                </div>
                <input type="range" id="seekBar" class="seek-bar" min="0" max="100" value="0" step="0.1">
                <div class="rec-row">
                    <button id="processBtn" class="btn-primary" disabled>⏺ Process & Export</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>

<script>
// ─────────────────────────────────────────────
//  DOM refs
// ─────────────────────────────────────────────
const video         = document.getElementById('inputVideo');
const canvas        = document.getElementById('outputCanvas');
const ctx           = canvas.getContext('2d', { willReadFrequently: false });
const statusEl      = document.getElementById('status');
const uploadArea    = document.getElementById('uploadArea');
const uploadVideo   = document.getElementById('uploadVideo');
const videoControls = document.getElementById('videoControls');
const playPauseBtn  = document.getElementById('playPauseBtn');
const restartBtn    = document.getElementById('restartBtn');
const seekBar       = document.getElementById('seekBar');
const timeDisplay   = document.getElementById('timeDisplay');
const processBtn    = document.getElementById('processBtn');
const blurRadiusIn  = document.getElementById('blurRadius');
const blurVal       = document.getElementById('blurValue');
const resSel        = document.getElementById('resolutionSelect');
const detectRateIn  = document.getElementById('detectionRate');
const rateVal       = document.getElementById('rateValue');
const sensitivityIn = document.getElementById('sensitivity');
const sensitivityVal= document.getElementById('sensitivityValue');
const memFill       = document.getElementById('memFill');
const memLabel      = document.getElementById('memLabel');
const maskTypeSelect= document.getElementById('maskTypeSelect');
const sizeOffsetIn  = document.getElementById('sizeOffset');
const sizeOffsetVal = document.getElementById('sizeOffsetValue');
const maxFacesIn    = document.getElementById('maxFacesIn');
const maxFacesVal   = document.getElementById('maxFacesValue');

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let model            = null;
let mediaRecorder    = null;
let recordedChunks   = [];
let rafId            = null;
let isRunning        = false;
let cachedFaces      = [];
let lastDetectMs     = 0;
let detectPending    = false;

// ─────────────────────────────────────────────
//  User settings (live)
// ─────────────────────────────────────────────
let blurRadius     = 30;
let resScale       = 0.5;
let detectInterval = 300;
let sensitivity    = 0.70;
let maskType       = 'blur';    // 'blur' or 'black'
let sizeOffset     = 0;         // px offset to enlarge/shrink mask
let maxFaces       = 1;         // how many faces to mask (top-N by probability)


// ─────────────────────────────────────────────
//  Settings listeners
// ─────────────────────────────────────────────
blurRadiusIn.addEventListener('input', e => {
    blurRadius = +e.target.value;
    blurVal.textContent = blurRadius + 'px';
});

resSel.addEventListener('change', e => {
    resScale = +e.target.value;
    if (video.videoWidth) resizeCanvas();
});

detectRateIn.addEventListener('input', e => {
    detectInterval = +e.target.value;
    rateVal.textContent = detectInterval + 'ms';
});

sensitivityIn.addEventListener('input', e => {
    sensitivity = +e.target.value;
    sensitivityVal.textContent = sensitivity.toFixed(2);
});

maskTypeSelect.addEventListener('change', e => {
    maskType = e.target.value;
});

sizeOffsetIn.addEventListener('input', e => {
    sizeOffset = +e.target.value;
    sizeOffsetVal.textContent = (sizeOffset >= 0 ? '+' : '') + sizeOffset + 'px';
});

maxFacesIn.addEventListener('input', e => {
    maxFaces = +e.target.value;
    maxFacesVal.textContent = maxFaces;
});

function resizeCanvas() {
    canvas.width  = Math.round(video.videoWidth  * resScale);
    canvas.height = Math.round(video.videoHeight * resScale);
    cachedFaces = [];   // invalidate — coords are now stale
}

// ─────────────────────────────────────────────
//  Drag & drop
// ─────────────────────────────────────────────
uploadArea.addEventListener('dragover',  e => { e.preventDefault(); uploadArea.classList.add('dragging'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragging'));
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragging');
    const f = e.dataTransfer.files[0];
    if (f?.type.startsWith('video/')) handleVideoUpload(f);
});
uploadVideo.onchange = e => { if (e.target.files[0]) handleVideoUpload(e.target.files[0]); };

// ─────────────────────────────────────────────
//  Time display
// ─────────────────────────────────────────────
function fmt(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
video.addEventListener('timeupdate', () => {
    if (video.duration) {
        timeDisplay.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
        seekBar.value = (video.currentTime / video.duration) * 100;
    }
});

// ─────────────────────────────────────────────
//  Playback controls
// ─────────────────────────────────────────────
playPauseBtn.addEventListener('click', () => {
    if (video.paused) { video.play(); startLoop(); }
    else              { video.pause(); stopLoop(); }
    playPauseBtn.textContent = video.paused ? '▶ Play' : '⏸ Pause';
});

restartBtn.addEventListener('click', () => {
    video.currentTime = 0;
    video.play();
    playPauseBtn.textContent = '⏸ Pause';
    startLoop();
});

let isSeeking = false;
seekBar.addEventListener('mousedown',  () => { isSeeking = true; video.pause(); });
seekBar.addEventListener('touchstart', () => { isSeeking = true; video.pause(); }, {passive:true});
seekBar.addEventListener('input', e => {
    video.currentTime = (e.target.value / 100) * video.duration;
});
seekBar.addEventListener('mouseup',  () => { isSeeking = false; video.play(); startLoop(); });
seekBar.addEventListener('touchend', () => { isSeeking = false; video.play(); startLoop(); });

video.addEventListener('ended', () => {
    stopLoop();
    playPauseBtn.textContent = '▶ Play';
});

// ─────────────────────────────────────────────
//  Face detection — runs in a separate async
//  task so it never blocks the render loop.
//  Tensors are always disposed after use.
// ─────────────────────────────────────────────
async function runDetection() {
    if (!model || detectPending || video.paused || video.ended) return;
    detectPending = true;

    let predictions;
    try {
        predictions = await model.estimateFaces(video, false);
    } catch(e) {
        detectPending = false;
        return;
    }

    // Explicit tensor cleanup
    tf.engine().startScope();
    tf.engine().endScope();

    // ── Original coordinate logic (Bug #3 fix reverted) ──
    // BlazeFace returns coords in video-native space.
    // Scale only the radius, not the position, to match canvas.
    const faces = [];
    for (const face of predictions) {
        const prob = Array.isArray(face.probability) ? face.probability[0] : (face.probability ?? 1);
        if (prob < sensitivity) continue;

        const start = face.topLeft;
        const end   = face.bottomRight;
        const width  = end[0] - start[0];
        const height = end[1] - start[1];

        const scaleX = canvas.width  / video.videoWidth;
        const scaleY = canvas.height / video.videoHeight;

        const centerX = (start[0] + width  / 2) * scaleX;
        const centerY = (start[1] + height / 2) * scaleY;
        const radius  = Math.max(width * scaleX, height * scaleY) / 2;

        faces.push({ centerX, centerY, radius, prob });
    }

    // Sort by probability descending, keep only the top maxFaces
    faces.sort((a, b) => b.prob - a.prob);
    cachedFaces = faces.slice(0, maxFaces);
    detectPending = false;
}

// ─────────────────────────────────────────────
//  Render loop — draws every rAF tick;
//  detection is triggered on a timer and runs
//  concurrently (does NOT block render).
// ─────────────────────────────────────────────
function renderFrame(now) {
    if (!isRunning) return;
    rafId = requestAnimationFrame(renderFrame);

    if (video.paused || video.ended || video.readyState < 2) return;

    // 1. Draw current video frame
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // 2. If faces cached, apply blur patches
    if (cachedFaces.length > 0) applyBlur();

    // 3. Kick off detection if enough time has passed
    if (now - lastDetectMs >= detectInterval) {
        lastDetectMs = now;
        runDetection();   // fire-and-forget; updates cachedFaces async
    }

    // 4. Update memory meter (every ~60 frames ≈ 1s)
    if (Math.random() < 0.016) updateMemMeter();
}

// ─────────────────────────────────────────────
//  Applies either blur or black ellipse mask
//  based on user's maskType selection.
// ─────────────────────────────────────────────
function applyBlur() {
    for (const { centerX, centerY, radius } of cachedFaces) {
        const r = (radius * 1.15) + sizeOffset; // slight padding + user offset
        if (r <= 0) continue; // skip if offset made it negative

        if (maskType === 'black') {
            // Black ellipse with soft feathered edges
            const grad = ctx.createRadialGradient(
                centerX, centerY, r * 0.55,
                centerX, centerY, r
            );
            grad.addColorStop(0,   'rgba(0,0,0,1)');
            grad.addColorStop(0.6, 'rgba(0,0,0,0.95)');
            grad.addColorStop(1,   'rgba(0,0,0,0)');

            ctx.save();
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, r, r, 0, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        } else {
            // Pixelated blur effect
            const x = Math.max(0, centerX - r);
            const y = Math.max(0, centerY - r);
            const w = Math.min(r * 2, canvas.width - x);
            const h = Math.min(r * 2, canvas.height - y);
            if (w <= 0 || h <= 0) continue;

            // Pixelation: scale down then scale up
            const pixelSize = Math.max(4, Math.round(r / 6));
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            const smallW = Math.ceil(w / pixelSize);
            const smallH = Math.ceil(h / pixelSize);
            tempCanvas.width = smallW;
            tempCanvas.height = smallH;

            // Draw scaled down
            tempCtx.drawImage(canvas, x, y, w, h, 0, 0, smallW, smallH);

            // Create circular clip and draw scaled up
            ctx.save();
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, r, r, 0, 0, Math.PI * 2);
            ctx.clip();
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(tempCanvas, 0, 0, smallW, smallH, x, y, w, h);
            ctx.restore();
        }
    }
}

// ─────────────────────────────────────────────
//  Loop helpers
// ─────────────────────────────────────────────
function startLoop() {
    if (isRunning) return;
    isRunning = true;
    lastDetectMs = 0;   // force detection on first frame
    rafId = requestAnimationFrame(renderFrame);
    setStatus('active', '▶ Processing video…');
}

function stopLoop() {
    isRunning = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

// ─────────────────────────────────────────────
//  Video load
// ─────────────────────────────────────────────
function handleVideoUpload(file) {
    stopLoop();
    if (video.src) URL.revokeObjectURL(video.src);

    video.src = URL.createObjectURL(file);
    video.muted = false;

    video.onloadedmetadata = () => {
        resizeCanvas();
        videoControls.classList.add('active');
        processBtn.disabled = false;
        cachedFaces = [];
        lastDetectMs = 0;
        video.play();
        playPauseBtn.textContent = '⏸ Pause';
        startLoop();
    };
}

// ─────────────────────────────────────────────
//  Model load
// ─────────────────────────────────────────────
async function loadModel() {
    setStatus('', 'Loading AI model…');
    try {
        // Use WebGL backend for GPU-accelerated inference; fall back to WASM/CPU
        await tf.setBackend('webgl');
        await tf.ready();
    } catch(e) {
        await tf.setBackend('cpu');
    }
    model = await blazeface.load({ maxFaces: 3 });  // load up to 3; filtered in JS by maxFaces setting
    setStatus('ready', '✓ Ready — upload a video');
}

// ─────────────────────────────────────────────
//  Memory meter
// ─────────────────────────────────────────────
function updateMemMeter() {
    const info = tf.memory();
    const tensors = info.numTensors;
    // Warn if tensors pile up (leak indicator); cap bar at 200 tensors
    const pct = Math.min((tensors / 200) * 100, 100);
    memFill.style.width = pct + '%';
    memFill.style.background = pct > 70
        ? 'linear-gradient(90deg,#f87171,#fbbf24)'
        : 'linear-gradient(90deg,#22d3a0,#7c6cfc)';
    memLabel.textContent = tensors + ' tensors';
}

// ─────────────────────────────────────────────
//  Status helper
// ─────────────────────────────────────────────
function setStatus(cls, msg) {
    statusEl.className = '';
    if (cls) statusEl.classList.add(cls);
    statusEl.textContent = msg;
}

// ─────────────────────────────────────────────
//  Process & Export
//  Restarts video from beginning, starts recording,
//  and auto-downloads when the video ends.
// ─────────────────────────────────────────────
processBtn.onclick = () => {
    recordedChunks = [];

    // Restart video from the top
    video.currentTime = 0;
    video.play();
    playPauseBtn.textContent = '⏸ Pause';
    startLoop();

    const stream = canvas.captureStream(30);
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
        ? 'video/webm;codecs=vp9'
        : 'video/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 2_000_000 });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(blob),
            download: 'face_blur_' + Date.now() + '.webm'
        });
        a.click();
        processBtn.disabled = false;
        processBtn.textContent = '⏺ Process & Export';
        setStatus('ready', '✓ File downloaded');
    };

    mediaRecorder.start(500);
    processBtn.disabled = true;
    processBtn.textContent = '⏳ Processing…';
    setStatus('recording', '⏺ Recording — will download when video ends');

    // When video ends, stop recording → triggers onstop → downloads
    video.addEventListener('ended', function onEnded() {
        video.removeEventListener('ended', onEnded);
        if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
        stopLoop();
        playPauseBtn.textContent = '▶ Play';
    });
};

// ─────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────
loadModel();
</script>
